name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: accounting-app
  EKS_CLUSTER: accounting
  DOMAIN: accounting-8cvbj8765rv.pawel.dev
  ECR_REPOSITORY_URL: 739055946005.dkr.ecr.us-west-2.amazonaws.com/accounting-app

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: accounting_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: accounting_test
          DB_USER: test
          DB_PASSWORD: test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version (main)
        if: github.ref == 'refs/heads/main'
        id: version
        run: |
          PATCH=$(git rev-list --count HEAD)
          VERSION="0.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Generated version: ${VERSION}"

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF_NAME=$(echo "${{ github.head_ref }}" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')
            SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
            TAG="gha-${REF_NAME}-${SHORT_SHA}"
          else
            TAG="${{ steps.version.outputs.version }}"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.image_tag }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/{1}:{2}', steps.login-ecr.outputs.registry, env.ECR_REPOSITORY, github.sha) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag version in git
        if: github.ref == 'refs/heads/main'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: deploy/terraform/application_layer
        run: terraform init

      - name: Terraform Apply
        working-directory: deploy/terraform/application_layer
        run: terraform apply -auto-approve -var="app_image_tag=${{ needs.build-and-push.outputs.version }}"

  deploy-pr:
    needs: build-and-push
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl and Helm
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Deploy PR environment
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          helm upgrade --install "pr-${PR_NUMBER}" ./deploy/helm/accounting-app \
            --namespace "pr-${PR_NUMBER}" \
            --create-namespace \
            -f deploy/helm/pr-values.yaml \
            --set image.repository="${ECR_REPOSITORY_URL}" \
            --set image.tag="${IMAGE_TAG}" \
            --set ingress.host="pr-${PR_NUMBER}.${DOMAIN}" \
            --set env.DB_NAME="pr_${PR_NUMBER}" \
            --set env.DB_USER="app" \
            --set externalSecrets.enabled=true \
            --set externalSecrets.dbPasswordSecretName="dev/db-password" \
            --set externalSecrets.dbHostSecretName="dev/db-host" \
            --set externalSecrets.dbPortSecretName="dev/db-port" \
            --set externalSecrets.googleSaKeySecretName="accounting/google-sa-key" \
            --wait --timeout 5m

      - name: Comment PR with environment URL
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          URL="https://pr-${PR_NUMBER}.${DOMAIN}"
          BODY="**Preview environment deployed**

          ${URL}

          _Image:_ \`${{ needs.build-and-push.outputs.image_tag }}\`"

          # Update existing comment or create new one
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("**Preview environment")) | .id' | tail -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="${BODY}"
          else
            gh pr comment "${PR_NUMBER}" --body "${BODY}"
          fi
