services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: accounting_test
      POSTGRES_USER: app
      POSTGRES_PASSWORD: testpassword
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d accounting_test"]
      interval: 2s
      timeout: 3s
      retries: 5
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
