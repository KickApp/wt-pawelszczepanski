apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "index.fullname" . }}
  labels:
    {{- include "index.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "index.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "index.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "index.fullname" . }}
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: data
              mountPath: /data
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
        - name: discovery
          image: "{{ .Values.discovery.image.repository }}:{{ .Values.discovery.image.tag }}"
          imagePullPolicy: {{ .Values.discovery.image.pullPolicy }}
          command: ["/bin/sh", "/scripts/discover.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.discovery.resources | nindent 12 }}
      volumes:
        - name: html
          configMap:
            name: {{ include "index.fullname" . }}-html
            items:
              - key: index.html
                path: index.html
        - name: nginx-conf
          configMap:
            name: {{ include "index.fullname" . }}-html
            items:
              - key: nginx.conf
                path: default.conf
        - name: scripts
          configMap:
            name: {{ include "index.fullname" . }}-html
            items:
              - key: discover.sh
                path: discover.sh
            defaultMode: 0755
        - name: data
          emptyDir: {}
