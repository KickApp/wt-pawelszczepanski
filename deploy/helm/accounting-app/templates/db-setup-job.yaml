{{- if .Values.dbSetup.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "accounting-app.fullname" . }}-db-setup
  labels:
    {{- include "accounting-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-setup
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - |
              echo "Checking if database $DB_NAME exists..."
              if psql -lqt | cut -d \| -f 1 | grep -qw "$DB_NAME"; then
                echo "Database $DB_NAME already exists"
              else
                echo "Creating database $DB_NAME..."
                createdb "$DB_NAME"
                echo "Database $DB_NAME created"
              fi
          env:
            - name: DB_NAME
              value: {{ .Values.env.DB_NAME | quote }}
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "accounting-app.fullname" . }}
                  key: DB_HOST
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "accounting-app.fullname" . }}
                  key: DB_PORT
            - name: PGUSER
              value: {{ .Values.env.DB_USER | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "accounting-app.fullname" . }}
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
{{- end }}
