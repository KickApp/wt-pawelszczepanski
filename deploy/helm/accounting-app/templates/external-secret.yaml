{{- if .Values.externalSecrets.enabled -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "accounting-app.fullname" . }}
  labels:
    {{- include "accounting-app.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "accounting-app.fullname" . }}
    kind: SecretStore
  target:
    name: {{ include "accounting-app.fullname" . }}
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.dbPasswordSecretName }}
    - secretKey: GOOGLE_SA_KEY_JSON
      remoteRef:
        key: {{ .Values.externalSecrets.googleSaKeySecretName }}
{{- end }}
